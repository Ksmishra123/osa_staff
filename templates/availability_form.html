{% extends 'base.html' %}
{% block content %}
<h2>{{ 'Edit' if row else 'New' }} Availability</h2>
<form method="post" class="card p-3">
  <div class="mb-2">
    <label>City (optional)</label>
    <select class="form-control" name="city_name">
      <option value="">Any city</option>
      {% for city in city_options %}
        <option value="{{ city }}" {% if row and row.city_name == city %}selected{% endif %}>{{ city }}</option>
      {% endfor %}
    </select>
  </div>
  <input type="hidden" name="start_date" value="{{ row.start_date if row and row.start_date else '' }}">
  <input type="hidden" name="end_date" value="{{ row.end_date if row and row.end_date else '' }}">
  <div class="mb-2">
    <label>Status</label>
    <input class="form-control" type="text" name="status" value="{{ row.status if row else 'available' }}" required>
  </div>
  <div class="mb-2">
    <label>Notes</label>
    <textarea class="form-control" name="notes">{{ row.notes if row else '' }}</textarea>
  </div>
  <button class="btn btn-primary" type="submit">Save</button>
  <a class="btn btn-link" href="{{ url_for('availability_list') }}">Cancel</a>
</form>
{% endblock %}
